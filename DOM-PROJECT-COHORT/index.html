<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
      
      <section class="allelems">
          <div class="todo elem" id="0">
            <img src="https://plus.unsplash.com/premium_photo-1769370658708-92ce07cd18a8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDE1MXxDRHd1d1hKQWJFd3x8ZW58MHx8fHx8" alt="">
           <h2>To do list</h2>
           

          </div>

           <div class="daily elem" id="1">
                  <img src="https://images.unsplash.com/photo-1678986718987-76f0b9357e0f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
              <h2>Daily Planner</h2>
          </div>

           <div class="moti elem" id="2">
                <img src="https://images.unsplash.com/photo-1677249490921-3246e81f19e3?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fDNkfGVufDB8fDB8fHww" alt="">
                
            <h2>Motivation</h2>
          </div>

           <div class="pomo elem " id="3">
                <img src="https://images.unsplash.com/photo-1643780668909-580822430155?q=80&w=1632&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
                 <h2>Pomodoro Timer</h2>
          </div>

              <div class="goals elem" id="4">
                <img src="https://images.unsplash.com/photo-1635241161466-541f065683ba?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">

                  <h2> Daily Goals</h2>
            </div>

      </section>

      <section class="fullElem todo-list-fullpage" >
         <button class="back" id="0"> close</button>
         <h2>your personalised to do list</h2>

         <div class="todo-container" >
          
          <div class="addtask">
            <form >
             
              <input id="task-input" type="text" placeholder="Enter task">
              <textarea placeholder="Enter details" name="" id="" rows="4" cols="50"></textarea>
              <div class="mark-imp">
                <input type="checkbox" name="" id="check" >
                <label for="check">mark as important</label>
              </div>
              <button>add task</button>
            </form>

          </div>
          <div class="alltask">
            <div class="task">
              
            <div class="task">
              <h5>go to gym</h5>
              <button>mark as completed</button>
            </div>
            <div class="task">
              <h5>go to grocery store</h5>
              <button>mark as completed</button>
            </div>
            <div class="task">
              <h5>call mom</h5>
              <button>mark as completed</button>
            </div>

          </div>
         </div>

      </section> 
      <section class="fullElem daily-planner-fullpage"`>
         <button class="back" id="1"> close</button>
         <h1>daily planner </h1>
      </section>
      <section class="fullElem motivation-fullpage">
         <button class="back" id="2"> close</button>   
         <h1>Motivation quote</h1>
      </section>
      <section class="fullElem pomodoro-fullpage">
         <button class="back" id="3"> close</button>

         <h1>pomodoro timer</h1>
      </section>
      <section class="fullElem daily-goals-fullpage">
         <button class="back" id="4"> close</button>

         <h1>Daily Goals</h1>
      </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
